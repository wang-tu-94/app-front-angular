<h1 class="text-center mb-2">Liste des produits</h1>

<p-toolbar>
    <div class="p-toolbar-group-start">
        <p-button icon="pi pi-plus"  label="Créer produit" (onClick)="onCreate()" class="block text-center mb-2"/>
    </div>
    <div class="p-toolbar-group-center gap-2">
        <p-dropdown [options]="categories" placeholder="Toutes les catégories" [(ngModel)]="filter.category" class="w-full md:w-1/3"></p-dropdown>
    </div>
    <div class="p-toolbar-group-end gap-2">
        <p-button label="Rechercher" (onClick)="search()" class="w-full md:w-auto"></p-button>
        <p-button label="Réinitialiser" (onClick)="reset()" class="w-full md:w-auto" severity="secondary"></p-button>
    </div>
</p-toolbar>

<p-dataView #dv [value]="products()?.content" [rows]="products()?.size" [paginator]="true"
            [paginatorPosition]="'top'" [totalRecords]="products()?.totalElements"
            [showPageLinks]="true" (onPage)="onPageChange($event)" [lazy]="true">
    <ng-template pTemplate="list" let-products>
        <div class="grid grid-nogutter">
            @for (item of products; track item; let first = $first) {
                <div class="col-12 relative">
                    <div class="flex flex-column sm:flex-row sm:align-items-center p-4 gap-3"
                         [ngClass]="{ 'border-top-1 surface-border': !first }">
                        <div class="md:w-10rem relative">
                            <img class="block xl:block mx-auto border-round w-full"
                                 [src]="'https://primefaces.org/cdn/primeng/images/demo/product/' + item.image"
                                 [alt]="item.name"/>
                            <p-tag [value]="item.inventoryStatus" [severity]="getSeverity(item)" class="absolute"
                                   [style.left.px]="4" [style.top.px]="4"/>
                        </div>
                        <div class="flex flex-column md:flex-row justify-content-between md:align-items-center flex-1 gap-4">
                            <div class="flex flex-row md:flex-column justify-content-between align-items-start gap-2">
                                <div>
                                    <span class="font-medium text-secondary text-sm">{{ item.category }}</span>
                                    <div class="text-lg font-medium text-900 mt-2">{{ item.name }}</div>
                                </div>
                                <div class="surface-100 p-1" style="border-radius: 30px">
                                    <div class="surface-0 flex align-items-center gap-2 justify-content-center py-1 px-2"
                                         style="border-radius: 30px; box-shadow: 0px 1px 2px 0px rgba(0, 0, 0, 0.04), 0px 1px 2px 0px rgba(0, 0, 0, 0.06)">
                                        <span class="text-900 font-medium text-sm">{{ item.rating }}</span>
                                        <i class="pi pi-star-fill text-yellow-500"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-column md:align-items-end gap-5">
                                <span class="text-xl font-semibold text-900 mr-3">{{ item.price | currency:'EUR':'symbol':'1.2-2':'fr-FR' }}</span>
                                <div class="flex flex-row-reverse md:flex-row gap-2">
                                    <app-cart-controls [product]="item"></app-cart-controls>
                                    <div class="flex flex-row-reverse md:flex-row gap-2 mt-2">
                                        <p-button label="Modifier" severity="secondary" (onClick)="onUpdate(item)"/>
                                        <p-button label="Supprimer" severity="danger" (onClick)="onDelete(item)" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            }
        </div>
    </ng-template>
</p-dataView>

<p-dialog [(visible)]="isDialogVisible"
    [style]="{ width: '50vw' }"
    header="Ajout/Edition produit">
    <app-product-form
        [product]="editedProduct()"
        (save)="onSave($event)"
        (cancel)="onCancel()"
    />
</p-dialog>
