<div class="flex align-items-center">
  @if (accountService.isAuthenticated()) {
    <div class="flex align-items-center gap-2 px-3 py-1 border-round-3xl bg-primary-reverse border-1 border-200">
      <span class="font-medium text-sm text-700">{{ account().username }}</span>
      <p-avatar
        [label]="account().username?.charAt(0)?.toUpperCase()"
        shape="circle"
        styleClass="bg-primary text-white">
      </p-avatar>
    </div>
  } @else {
    <p-button
      icon="pi pi-user"
      [rounded]="true"
      [text]="true"
      severity="secondary"
      (click)="showLogin()">
    </p-button>
  }
</div>
