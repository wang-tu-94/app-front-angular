<div class="card">

  <p-toolbar styleClass="mb-4">

    <ng-template #start>
      <p-button icon="pi pi-plus" label="Créer page" (onClick)="onCreate()" />
    </ng-template>

    <ng-template #center>
      <div class="flex flex-wrap align-items-center gap-3">
        <p-iconfield iconPosition="left">
          <p-inputicon class="pi pi-search" />
          <input pInputText type="text" [(ngModel)]="filter.name" (keyup.enter)="search()" placeholder="Nom de la page" class="w-full sm:w-15rem" />
        </p-iconfield>
        <p-select [options]="stateOptions" [(ngModel)]="filter.state" (keyup.enter)="search()" placeholder="Tous les états" optionLabel="label" optionValue="value" [showClear]="true" class="w-full sm:w-15rem"></p-select>
        <p-datePicker [(ngModel)]="uiDate" (keyup.enter)="search()" placeholder="Publié après le..." dateFormat="dd/mm/yy" [showClear]="true" class="w-full sm:w-15rem"></p-datePicker>
      </div>
    </ng-template>

    <ng-template #end>
      <div class="flex align-items-center gap-2">
        <p-button label="Rechercher" (onClick)="search()" />
        <p-button icon="pi pi-filter-slash" severity="secondary" (onClick)="reset()" pTooltip="Réinitialiser les filtres" />
      </div>
    </ng-template>
  </p-toolbar>

  <p-table [value]="pages()" stripedRows  [loading]="loading()"
           [paginator]="true" [paginatorPosition]="'top'"
           [first]="firstPage()"
           (firstChange)="firstPage.set($event)"
           [rows]="this.size()"
           [totalRecords]="totalElements()" [lazy]="true"
           (onLazyLoad)="onLazyLoad($event)" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>State</th>
        <th>Updated Date</th>
        <th>Published Date</th>
      </tr>
    </ng-template>
    <ng-template #body let-page>
      <tr>
        <td>{{ page.name }}</td>
        <td>
          <p-badge [value]="page.state" [severity]="stateSeverity(page)" />
        </td>
        <td>{{ page.updatedDate | date: 'dd/MM/yyyy' }}</td>
        <td>{{ page.publishedDate | date: 'dd/MM/yyyy' }}</td>
      </tr>

    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="4">Aucune donnée trouvée. Longueur du signal : {{ pages().length }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
