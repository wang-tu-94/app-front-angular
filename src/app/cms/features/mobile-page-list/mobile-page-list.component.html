<div class="card">
  <p-toolbar>
    <div class="p-toolbar-group-start gap-2">
      <p-button icon="pi pi-plus" label="Créer mobile page" (onClick)="onCreate()" class="w-full md:w-auto text-center"/>
    </div>
    <div class="p-toolbar-group-center gap-2">
<!--      <p-dropdown [options]="categories" placeholder="Toutes les catégories" [(ngModel)]="filter.category" class="w-full md:w-1/3"></p-dropdown>-->
    </div>
    <div class="p-toolbar-group-end gap-2">
      <p-button label="Rechercher" (onClick)="search()" class="w-full md:w-auto"></p-button>
      <p-button label="Réinitialiser" (onClick)="reset()" class="w-full md:w-auto" severity="secondary"></p-button>
    </div>
  </p-toolbar>

  <p-table [value]="pages()" stripedRows  [paginator]="true" [loading]="loading()"
           [paginatorPosition]="'top'" [totalRecords]="totalElements()"
           [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>State</th>
        <th>Updated Date</th>
        <th>Published Date</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-page>
      <tr>
        <td>{{ page.name }}</td>
        <td>
          <p-badge [value]="page.state" [severity]="stateSeverity(page)" />
        </td>
        <td>{{ page.updatedDate | date: 'dd/MM/yyyy' }}</td>
        <td>{{ page.publishedDate | date: 'dd/MM/yyyy' }}</td>
      </tr>

    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4">Aucune donnée trouvée. Longueur du signal : {{ pages().length }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
