name: Deploy product-frontend

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          # Le point '.' signifie que le Dockerfile est à la racine
          # Si ton front est dans un sous-dossier, mets : context: ./nom-dossier
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/product-frontend:latest
